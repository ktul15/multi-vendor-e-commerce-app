name: CI

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  ci:
    name: Lint → Test → Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Must run before lint — ESLint resolves TypeScript imports from generated client
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Apply migrations and run tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          TEST_DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access-secret-not-for-production
          JWT_REFRESH_SECRET: ci-refresh-secret-not-for-production
          NODE_ENV: test
        run: |
          npx prisma migrate deploy
          npm test

      - name: Build
        run: npm run build
